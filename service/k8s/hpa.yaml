# Cost-effective: scale from 1 when needed, cap max to limit cost spikes
# Fast scale-up so scaling is visible within ~90s load test (HPA sync ~15s + pod startup)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stress-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stress-service
  minReplicas: 1
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
