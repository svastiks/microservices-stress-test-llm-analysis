apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-service
  labels:
    app: stress-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-service
  template:
    metadata:
      labels:
        app: stress-service
    spec:
      containers:
        - name: app
          image: stress-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: CPU_WORK_MS
              value: "0"
            - name: MEMORY_MB
              value: "0"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "2m"
              memory: "12Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5